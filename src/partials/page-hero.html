<!-- 下層ページ共通ヒーロー（BEM: page-hero）。マークアップ変更はこの1ファイルで全ページに反映されます。 -->
<section class="page-hero" aria-labelledby="@@heroHeadingId">
  <div class="page-hero__media" aria-hidden="true">
    <img src="@@heroImgSrc" alt="" />
  </div>
  <div class="page-hero__inner container">
    <h1 id="@@heroHeadingId" class="page-hero__title">@@heroTitleEn</h1>
    <p class="page-hero__lead">@@heroTitleJa</p>
  </div>
</section>
