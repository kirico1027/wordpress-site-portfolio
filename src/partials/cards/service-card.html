<!-- WP: get_template_part('template-parts/cards/service-card') — Service 固定ページ Repeater / 外部URL -->
<li class="service-card">
  <div class="service-card__head">
    <p class="service-card__num">@@num</p>
    <h3 class="service-card__title">@@title</h3>
    <p class="service-card__en">@@en</p>
  </div>
  <p class="service-card__desc">@@desc</p>
  <a class="service-card__link" href="@@href">詳しくはこちら<span class="material-icons" aria-hidden="true">keyboard_arrow_right</span></a>
</li>
