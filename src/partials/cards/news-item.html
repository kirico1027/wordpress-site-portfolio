<!-- WP: get_template_part('template-parts/cards/news-item') — CPT news ループ -->
<li class="news-item">
  <a class="news-item__link" href="@@href">
    <div class="news-item__meta">
      <time class="news-item__date" datetime="@@datetime">@@date</time>
      <span class="news-item__tag">@@tag</span>
    </div>
    <p class="news-item__title">@@title</p>
  </a>
</li>
